<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dépôt SAFEWAY</title>

<script src="https://unpkg.com/@supabase/supabase-js@2"></script>

<style>
body{
margin:0;
font-family:Arial;
background:#f5f6fa;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.back-btn{
position:fixed;
top:15px;
left:15px;
font-size:22px;
background:#fff;
width:40px;
height:40px;
border-radius:50%;
display:flex;
align-items:center;
justify-content:center;
box-shadow:0 2px 8px rgba(0,0,0,0.1);
cursor:pointer;
}

.box{
background:#fff;
padding:20px;
border-radius:15px;
width:90%;
max-width:400px;
box-shadow:0 5px 15px rgba(0,0,0,0.1);
}

h2{text-align:center;}

input, select, button{
width:100%;
padding:12px;
margin-top:10px;
border-radius:10px;
border:1px solid #ddd;
}

button{
background:#3b82f6;
color:#fff;
font-weight:bold;
border:none;
cursor:pointer;
}

#error{
color:red;
margin-top:10px;
font-size:14px;
text-align:center;
}

.loader{
margin:15px auto;
border:4px solid #f3f3f3;
border-top:4px solid #3b82f6;
border-radius:50%;
width:30px;
height:30px;
animation:spin 1s linear infinite;
}

@keyframes spin{
0%{transform:rotate(0deg);}
100%{transform:rotate(360deg);}
}
</style>
</head>

<body>

<div class="back-btn" onclick="goHome()">←</div>

<div class="box">
<h2>💰 Dépôt SAFEWAY</h2>

<select id="code_pays">
<option value="+226">Burkina Faso (+226)</option>
<option value="+228">Togo (+228)</option>
<option value="+229">Bénin (+229)</option>
<option value="+225">Côte d'Ivoire (+225)</option>
<option value="+237">Cameroun (+237)</option>
<option value="+221">Sénégal (+221)</option>
</select>

<input type="text" id="numero" placeholder="Numéro">
<input type="number" id="montant" placeholder="Montant (min 2000)">

<select id="operateur">
<option value="Orange Money">Orange Money</option>
<option value="Moov Money">Moov Money</option>
<option value="MTN Mobile Money">MTN Mobile Money</option>
<option value="Wave">Wave</option>
<option value="T-Money">T-Money</option>
<option value="Celtic">Celtic</option>
<option value="Ligdicash">Ligdicash</option>
<option value="Togocel">Togocel</option>
</select>

<button onclick="recharger()">Valider</button>

<div id="loader" class="loader" style="display:none;"></div>
<div id="error"></div>

</div>

<script>

const client = supabase.createClient(
"https://qixmtmfcscjkneodbvgx.supabase.co",
"eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InFpeG10bWZjc2Nqa25lb2Ridmd4Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ3MDY1NzUsImV4cCI6MjA5MDI4MjU3NX0.9rLqMeXfAKAC6GHt4SOe0sXjiEB7bfG5c_4PcI6gBu4"
);

/* HOME */
function goHome(){
window.location.href = "home.html";
}

/* USER LOCALSTORAGE */
function getUser(){
let u = localStorage.getItem("user");
if(!u){
window.location.href="login.html";
return null;
}
return JSON.parse(u);
}

/* DEPOT */
async function recharger(){

let errorBox = document.getElementById("error");
let loader = document.getElementById("loader");

errorBox.innerText = "";
loader.style.display = "block";

let user = getUser();
if(!user){
loader.style.display = "none";
return;
}

let codePays = document.getElementById("code_pays").value;
let numero = document.getElementById("numero").value.trim();
let montant = parseFloat(document.getElementById("montant").value);
let operateur = document.getElementById("operateur").value;

let numeroComplet = codePays + numero;

/* VALIDATION */
if(!numero || !montant || !operateur){
errorBox.innerText = "⚠️ Remplis tous les champs";
loader.style.display = "none";
return;
}

if(montant < 2000){
errorBox.innerText = "⚠️ Montant minimum est 2000 XOF";
loader.style.display = "none";
return;
}

/* APPEL FONCTION SQL SAFEWAY */
const { error } = await client.rpc("request_deposit", {
  p_user_id: user.id,
  p_numero: numeroComplet,
  p_montant: montant,
  p_operateur: operateur
});

loader.style.display = "none";

if(error){
console.log(error);
errorBox.innerText = error.message;
}else{
alert("✅ Dépôt envoyé. En attente de validation admin.");
window.location.href = "home.html";
}

}

</script>

</body>
</html>
