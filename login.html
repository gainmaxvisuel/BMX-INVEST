<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BMX - Connexion</title>

<script src="https://unpkg.com/@supabase/supabase-js@2"></script>

<style>
*{box-sizing:border-box;}

body{
margin:0;
background:#000;
color:#fff;
font-family:Arial;
display:flex;
flex-direction:column;
min-height:100vh;
}

.container{
flex:1;
display:flex;
flex-direction:column;
justify-content:center;
padding:20px;
max-width:400px;
margin:auto;
width:100%;
}

.logo{text-align:center;margin-bottom:20px;}
.logo h1{color:#ffb300;margin:0;}
.logo p{color:#aaa;font-size:14px;}

input, select{
width:100%;
padding:14px;
margin-top:10px;
background:#222;
border:none;
border-radius:10px;
color:#fff;
}

.box{position:relative;}

.eye{
position:absolute;
right:10px;
top:50%;
transform:translateY(-50%);
cursor:pointer;
}

button{
width:100%;
padding:14px;
margin-top:20px;
background:#ffb300;
border:none;
border-radius:10px;
font-weight:bold;
cursor:pointer;
}

.error{
color:red;
font-size:13px;
text-align:center;
margin-top:10px;
}

.link{text-align:center;margin-top:10px;}
.link a{color:#ffb300;text-decoration:none;}

.popup{
display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.9);
justify-content:center;
align-items:center;
z-index:999;
}

.popup-box{
background:#111;
padding:25px;
border-radius:12px;
text-align:center;
width:90%;
max-width:300px;
}
</style>

</head>

<body>

<div class="container">

<div class="logo">
<h1>BMX</h1>
<p>Investissez dans l'avenir, récoltez aujourd'hui.</p>
</div>

<select id="country">
<option value="">Choisir un pays</option>
<option value="+226">Burkina Faso (+226)</option>
<option value="+223">Mali (+223)</option>
<option value="+229">Bénin (+229)</option>
<option value="+228">Togo (+228)</option>
<option value="+225">Côte d'Ivoire (+225)</option>
<option value="+237">Cameroun (+237)</option>
</select>

<input id="phone" placeholder="Numéro">

<div class="box">
<input type="password" id="password" placeholder="Mot de passe">
<span class="eye" onclick="togglePass()">👁</span>
</div>

<button id="btn" onclick="login()">Se connecter</button>

<div class="link">
Pas de compte ?
<a href="index.html">S'inscrire</a>
</div>

<div class="error" id="msg"></div>

</div>

<!-- POPUP -->
<div class="popup" id="popup">
<div class="popup-box">
<h2 style="color:#ffb300;">✅ Connexion réussie</h2>
<p>Content de vous revoir 👋</p>
<button onclick="goHome()">Continuer</button>
</div>
</div>

<script>

const { createClient } = supabase;

const client = createClient(
"https://qixmtmfcscjkneodbvgx.supabase.co",
"eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InFpeG10bWZjc2Nqa25lb2Ridmd4Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ3MDY1NzUsImV4cCI6MjA5MDI4MjU3NX0.9rLqMeXfAKAC6GHt4SOe0sXjiEB7bfG5c_4PcI6gBu4"
);

// toggle password
function togglePass(){
let input = document.getElementById("password");
input.type = input.type === "password" ? "text" : "password";
}

// LOGIN
async function login(){

let country = document.getElementById("country").value;
let phone = document.getElementById("phone").value.trim().replace(/\s/g, "");
let password = document.getElementById("password").value;

let msg = document.getElementById("msg");
let btn = document.getElementById("btn");

msg.innerText = "";

if(!country || !phone || !password){
msg.innerText = "Remplis tous les champs";
return;
}

// reconstruction numéro complet
let fullPhone = country + phone;

console.log("PHONE LOGIN:", fullPhone);

btn.disabled = true;
btn.innerText = "Connexion...";

try{

const { data, error } = await client.rpc("login_user", {
p_phone: fullPhone,
p_password: password
});

if(error) throw error;

if(!data || data.length === 0){
throw new Error("Identifiants incorrects");
}

// sauvegarde session
localStorage.setItem("user", JSON.stringify(data[0]));

// popup
document.getElementById("popup").style.display = "flex";

}catch(err){
msg.innerText = err.message;
btn.disabled = false;
btn.innerText = "Se connecter";
}

}

// HOME
function goHome(){
window.location.href = "home.html";
}

</script>

</body>
</html>
